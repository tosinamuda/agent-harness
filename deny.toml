# cargo-deny configuration — supply-chain + license hygiene.
#   cargo install cargo-deny && cargo deny check
# (Run by scripts/check.sh when cargo-deny is installed.)

[advisories]
# Reject crates pulled from a yanked version. Known security advisories are
# denied by default in current cargo-deny.
yanked = "deny"

[licenses]
# Permissive only — matches the workspace's own `MIT OR Apache-2.0`.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
# Don't fail the whole check over a confidence threshold on an odd license file.
confidence-threshold = 0.8

[bans]
# Duplicate versions of one crate are a smell worth seeing, not a hard fail.
multiple-versions = "warn"
# A `*` version requirement is never acceptable for a published crate.
wildcards = "deny"

[sources]
unknown-registry = "deny"
# Some deps are consumed via git until the crates are published to crates.io.
unknown-git = "allow"
