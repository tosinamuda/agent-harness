# cargo-release configuration.
#   cargo install cargo-release
#   cargo release <level|version>            # DRY RUN by default — prints the plan
#   cargo release <level|version> --execute  # actually bump + changelog + commit + tag + publish
#
# The three crates version and release in lockstep:
#   * `shared-version` keeps their versions identical and bumps them together;
#   * cargo-release publishes in dependency order (cli-stream → bob-rs →
#     agent-harness), waiting for each to appear in the index;
#   * the CHANGELOG stamp (below) turns `## [Unreleased]` into a fresh
#     `## [Unreleased]` plus a dated version section.
#
# Pre-1.0 SemVer: a breaking change is `cargo release minor`; additive/fixes are
# `cargo release patch`. Run `cargo semver-checks` first if unsure which.
#
# First release:  cargo release 0.1.0 --execute
# Later releases: cargo release patch --execute   # or minor / major

shared-version = true
tag-name = "v{{version}}"

# Single shared workspace CHANGELOG. Scoped to the agent-harness crate (in its
# [package.metadata.release]) so it stamps exactly once — a workspace-level
# replacement here would run once per crate and duplicate the version header.
